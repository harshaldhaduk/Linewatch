<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg3:    rgba(255,255,255,0.12);
    --border: rgba(255,255,255,0.15);
    --accent: #a78bfa;
    --green:  #4ade80;
    --red:    #f87171;
    --gold:   #fbbf24;
    --text:   #ffffff;
    --sub:    rgba(255,255,255,0.65);
  }

  html, body {
    background: transparent;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    user-select: none;
    height: 100%;
    overflow: hidden;
  }

  #wrap {
    background: rgba(80,80,85,0.82);
    backdrop-filter: blur(32px) saturate(180%);
    -webkit-backdrop-filter: blur(32px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header-left { display: flex; align-items: center; gap: 8px; }
  #header-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--sub); }
  #header-dots { display: flex; gap: 4px; align-items: center; }
  .hdot { width: 4px; height: 4px; border-radius: 50%; }
  .hdot.won  { background: var(--green); box-shadow: 0 0 6px 2px var(--green); }
  .hdot.lost { background: var(--red);   box-shadow: 0 0 6px 2px var(--red); }
  .hdot.live { background: var(--gold);  box-shadow: 0 0 6px 2px var(--gold); animation: pulse 1.4s infinite; }
  .hdot.pre  { background: var(--sub);   box-shadow: 0 0 4px 1px var(--sub); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  #header-right { display: flex; align-items: center; gap: 10px; }
  #wl { font-size: 12px; font-weight: 700; display: flex; gap: 6px; }
  .wl-w { color: var(--green); }
  .wl-l { color: var(--red); }

  #account-switcher { display: none; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: var(--sub); }
  #account-label { min-width: 36px; text-align: center; }

  #refresh-btn {
    font-size: 13px; color: var(--sub); cursor: pointer;
    padding: 2px 4px; border-radius: 4px; transition: color 0.2s;
  }
  #refresh-btn:hover { color: var(--text); }
  #refresh-btn.spin { animation: spin 0.5s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #float-btn { font-size: 12px; color: var(--sub); cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  #float-btn:hover { color: var(--text); }

  #body {
    overflow-y: scroll;
    overflow-x: hidden;
    max-height: calc(100vh - 48px);
    -webkit-overflow-scrolling: touch;
  }
  #body::-webkit-scrollbar { width: 3px; }
  #body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .entry-hdr {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 14px 6px;
    border-bottom: 1px solid var(--border);
  }
  .entry-amt { font-size: 11px; font-weight: 700; color: var(--sub); }
  .entry-amt span { color: var(--gold); }
  .entry-rec { font-size: 11px; display: flex; gap: 6px; }
  .entry-rec .w { color: var(--green); font-weight: 700; }
  .entry-rec .l { color: var(--red); font-weight: 700; }

  .pick {
    display: grid; grid-template-columns: 48px 1fr 68px;
    gap: 10px; padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .pick:last-child { border-bottom: none; }
  .pick:hover { background: rgba(255,255,255,0.04); }
  .pick { cursor: pointer; }

  .av {
    width: 44px; height: 44px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--border);
    background: var(--bg3); flex-shrink: 0;
  }
  .av.won-r  { border-color: var(--green); box-shadow: 0 0 8px #4ade8066; }
  .av.lost-r { border-color: var(--red);   box-shadow: 0 0 8px #f8717166; }
  .av.live-r {
    border-color: #fff;
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  @keyframes live-pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(255,255,255,0.9), 0 0 8px rgba(255,255,255,0.4); border-color: #fff; }
    50%      { box-shadow: 0 0 0 4px rgba(255,255,255,0.2), 0 0 12px rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
  }
  .av-ph {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg3); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .av-ph.won-r  { border-color: var(--green); box-shadow: 0 0 8px #4ade8066; }
  .av-ph.lost-r { border-color: var(--red);   box-shadow: 0 0 8px #f8717166; }
  .av-ph.live-r { border-color: #fff; animation: live-pulse 1.4s ease-in-out infinite; }

  .mid { min-width: 0; }
  .name-row { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
  .pname { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pbadge { font-size: 9px; font-weight: 600; color: var(--sub); background: var(--bg3); padding: 1px 4px; border-radius: 3px; flex-shrink: 0; }
  .out-badge { font-size: 9px; font-weight: 700; color: var(--red); padding: 1px 4px; border-radius: 3px; border: 1px solid var(--red)66; flex-shrink: 0; }
  .game-row { font-size: 10px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
  .league-tag { background: var(--bg3); padding: 1px 4px; border-radius: 3px; font-weight: 600; margin-right: 3px; }
  .live-tag { color: var(--gold); font-weight: 600; }

  .prog-track { height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; margin-bottom: 3px; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .prog-fill.c-green  { background: var(--green); }
  .prog-fill.c-red    { background: var(--red); }
  .prog-fill.c-white  { background: rgba(255,255,255,0.85); }
  .prog-fill.c-grey   { background: rgba(255,255,255,0.25); }
  .prog-labels { display: flex; justify-content: space-between; font-size: 9px; font-weight: 600; }
  .prog-labels .cur { color: var(--text); }
  .prog-labels .lv  { color: var(--sub); }

  .linebox {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 6px 8px; text-align: center; flex-shrink: 0;
  }
  .linebox.won-box  { border-color: #4ade8044; background: #4ade800d; }
  .linebox.lost-box { border-color: #f8717144; background: #f871710d; }
  .dir { font-size: 14px; line-height: 1; margin-bottom: 1px; }
  .dir.up   { color: var(--green); }
  .dir.down { color: var(--red); }
  .linenum { font-size: 14px; font-weight: 800; color: var(--text); line-height: 1; }
  .statlbl { font-size: 8px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 1px; }
  .res-lbl { font-size: 9px; font-weight: 800; margin-top: 2px; }
  .res-lbl.w { color: var(--green); }
  .res-lbl.l { color: var(--red); }

  .msg { padding: 20px 16px; text-align: center; color: var(--sub); font-size: 13px; }
  .msg.err { color: var(--red); }
  .ediv { height: 1px; background: rgba(255,255,255,0.08); margin: 0 14px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <div id="header-left">
      <div id="header-title">Linewatch</div>
      <div id="header-dots"></div>
    </div>
    <div id="header-right">
      <div id="account-switcher">
        <span onclick="prevAccount()" style="cursor:pointer;padding:1px 5px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--sub)'">‹</span>
        <span id="account-label"></span>
        <span onclick="nextAccount()" style="cursor:pointer;padding:1px 5px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--sub)'">›</span>
      </div>
      <div id="wl"></div>
      <div id="float-btn" title="Floating window" onclick="toggleFloat()">⧉</div>
      <div id="refresh-btn" onclick="doRefresh()">↻</div>
    </div>
  </div>
  <div id="body"></div>
</div>

<script>
const { ipcRenderer } = require('electron');
let _accounts = [], _activeAccount = 0;

ipcRenderer.on('picks-data', (_, { entries, error, accounts, activeAccount }) => {
  _accounts = accounts || ['Acc 1'];
  _activeAccount = activeAccount || 0;
  const sw = document.getElementById('account-switcher');
  if (sw) sw.style.display = _accounts.length > 1 ? 'flex' : 'none';
  const lbl = document.getElementById('account-label');
  if (lbl) lbl.textContent = _accounts[_activeAccount] || '';
  render(entries, error);
  // Report natural content height: header + body content
  requestAnimationFrame(() => {
    const header = document.getElementById('header');
    const body = document.getElementById('body');
    if (header && body) {
      const h = header.offsetHeight + body.scrollHeight + 2; // +2 for border
      ipcRenderer.send('popup-height', h);
    }
  });
});

function toggleFloat() { ipcRenderer.send('toggle-float'); ipcRenderer.send('hide'); }
function prevAccount() { ipcRenderer.send('switch-account', (_activeAccount - 1 + _accounts.length) % _accounts.length); }
function nextAccount() { ipcRenderer.send('switch-account', (_activeAccount + 1) % _accounts.length); }
function openPick(encoded) {
  const p = JSON.parse(decodeURIComponent(encoded));
  const { shell } = require('electron');
  const league = (p.league || '').toUpperCase();
  const esports = ['CS2','CS:GO','LOL','DOTA2','DOTA','VALORANT','OVERWATCH','APEX','FORTNITE','ROCKET LEAGUE','COD','PUBG','R6','HALO'];
  const isEsport = esports.some(e => league.includes(e));
  const today = new Date();
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const mon = months[today.getMonth()];
  const dd = today.getDate();
  const yyyy = today.getFullYear();
  const teams = p.awayAbb && p.homeAbb ? `${p.awayAbb} vs ${p.homeAbb}` : p.name;

  if (isEsport) {
    const searchTeams = p.matchTitle || p.name;
    const query = encodeURIComponent(`${searchTeams} ${mon} ${dd} gosugamers`);
    shell.openExternal(`https://www.google.com/search?q=${query}`);
  } else {
    const query = encodeURIComponent(`${teams} ${p.league} ${mon} ${dd} espn`);
    shell.openExternal(`https://www.google.com/search?q=${query}&btnI=1`);
  }
}

function doRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spin');
  setTimeout(() => btn.classList.remove('spin'), 500);
  ipcRenderer.send('refresh');
}

function render(entries, error) {
  const body = document.getElementById('body');
  const dots = document.getElementById('header-dots');
  const wlEl = document.getElementById('wl');

  dots.innerHTML = '';
  const allPicks = (entries || []).flatMap(e => e.picks);
  allPicks.slice(0,10).forEach(p => {
    const d = document.createElement('div');
    d.className = 'hdot';
    if (['won','correct','win'].includes(p.result)) d.classList.add('won');
    else if (['lost','incorrect','loss'].includes(p.result)) d.classList.add('lost');
    else if (p.inGame) d.classList.add('live');
    else d.classList.add('pre');
    dots.appendChild(d);
  });

  const tw = (entries||[]).reduce((s,e)=>s+e.won,0);
  const tl = (entries||[]).reduce((s,e)=>s+e.lost,0);
  wlEl.innerHTML = `<span class="wl-w">${tw}W</span><span class="wl-l">${tl}L</span>`;

  if (error) { body.innerHTML = `<div class="msg err">⚠ ${error}</div>`; return; }
  if (!entries || !entries.length) { body.innerHTML = `<div class="msg">No active picks</div>`; return; }

  body.innerHTML = entries.map((entry, ei) => `
    <div class="entry-hdr">
      <div class="entry-amt">${entry.amount} <span>→ ${entry.payout}</span></div>
      <div class="entry-rec"><span class="w">${entry.won}W</span><span class="l">${entry.lost}L</span><span style="color:var(--sub)">${entry.open} live</span></div>
    </div>
    ${entry.picks.map(p => pickHtml(p)).join('')}
    ${ei < entries.length-1 ? '<div class="ediv"></div>' : ''}
  `).join('');
}

function pickHtml(p) {
  const _ppWon  = ['won','correct','win'].includes(p.result);
  const _ppLost = ['lost','incorrect','loss'].includes(p.result);
  const isDone  = p.gameFinished;
  // Trust result from API directly (Underdog sets result='won' without gameFinished)
  const isWon   = _ppWon;
  const isLost  = _ppLost;
  const isLive  = p.inGame && !isDone;
  const isPre   = !p.inGame && !isDone && !_ppWon && !_ppLost;

  const cur = p.current != null ? parseFloat(p.current) : null;
  const lin = parseFloat(p.line) || 1;
  // "winning" = currently beating the line — only meaningful when cur is not null
  const winning = cur != null ? (p.wagerType === 'over' ? cur >= lin : cur <= lin) : false;

  // Ring logic:
  // - game over + winning OR live + winning = green (no pulse)
  // - game over + losing = red (no pulse)
  // - live + losing = white pulse
  // - pre-game = no ring
  const isOver = p.wagerType === 'over';
  // Under pick: if cur already exceeds line, it's mathematically lost (can't go back down)
  const underBusted = !isOver && isLive && cur > lin;
  // Over pick: beating line while live
  const overWinning = isOver && isLive && winning;

  let ringCls = '';
  if (isWon || (isDone && winning))   ringCls = 'won-r';
  else if (isDone && !winning)        ringCls = 'lost-r';
  else if (underBusted)               ringCls = 'lost-r';  // under already blown
  else if (overWinning)               ringCls = 'won-r';   // over beating line
  else if (isLive)                    ringCls = 'live-r';  // white pulse otherwise

  const boxCls = isWon || (isDone && winning) ? 'won-box' : (isDone && !winning) || underBusted ? 'lost-box' : '';

  let fillCls = 'c-grey';
  if (isWon || (isDone && winning))   fillCls = 'c-green';
  else if ((isDone && !winning) || underBusted) fillCls = 'c-red';
  else if (overWinning)               fillCls = 'c-green';
  else if (isLive)                    fillCls = 'c-white';

  const pct = Math.min((cur / lin) * 100, 100);

  const avHtml = p.imgUrl
    ? `<img class="av ${ringCls}" src="${p.imgUrl}" onerror="this.outerHTML='<div class=\\'av-ph\\'>👤</div>'">`
    : `<div class="av-ph">👤</div>`;

  let gameStr = '';
  if (p.awayAbb && p.homeAbb) {
    if (isLive) {
      // Live: show scores and quarter/clock in gold
      const isHalftime = p.clock === '00:00' && (p.period === 2 || p.period === '2') && p.punit === 'quarter';
      let pl;
      if (isHalftime) pl = 'Halftime';
      else if (p.punit === 'inning') pl = `I${p.period}`;
      else if (p.punit === 'period') pl = `P${p.period}`;
      else if (p.punit === 'half') pl = `H${p.period}`;
      else pl = `Q${p.period}`;
      const clockStr = (isHalftime || p.clock === '00:00') ? '' : p.clock ? ` · ${p.clock}` : '';
      gameStr = `<span class="league-tag">${p.league}</span>${p.awayAbb} ${p.awaySc} @ ${p.homeAbb} ${p.homeSc} <span class="live-tag">${pl}${clockStr}</span>`;
    } else if (isPre && p.startTime) {
      // Pre-game: show teams and start time in gold
      gameStr = `<span class="league-tag">${p.league}</span>${p.awayAbb} @ ${p.homeAbb} <span class="live-tag">${p.startTime}</span>`;
    } else if (isDone) {
      // Game over: no yellow, just show final score
      gameStr = `<span class="league-tag">${p.league}</span>${p.awayAbb} ${p.awaySc} @ ${p.homeAbb} ${p.homeSc} FINAL`;
    } else {
    }
  } else if (p.league) {
    const timeStr = isPre && p.startTime ? `<span class="live-tag">${p.startTime}</span>` : (isLive && !isDone) ? '<span class="live-tag">LIVE</span>' : '';
    // Show match title if available (for esports Underdog picks)
    const matchTitle = p.matchTitle ? `${p.matchTitle} ` : '';
    gameStr = `<span class="league-tag">${p.league}</span>${matchTitle}${timeStr}`;
  }

  const progHtml = p.current != null && p.line != null ? `
    <div class="prog-track"><div class="prog-fill ${fillCls}" style="width:${pct}%"></div></div>
    <div class="prog-labels"><span class="cur">${cur%1===0?cur:cur.toFixed(1)}</span><span class="lv">/ ${lin}</span></div>` : '';

  const dir = p.wagerType==='over'?'↑':'↓';
  const dirCls = p.wagerType==='over'?'up':'down';
  const odds = '';
  const statAbbr = {
    'Points + Rebounds + Assists': 'PRA',
    'Points + Rebounds': 'Pts+Reb',
    'Points + Assists': 'Pts+Ast',
    'Rebounds + Assists': 'Reb+Ast',
    'Pts + Rebs + Asts': 'PRA',
    'REBS+ASTS': 'Reb+Ast',
    'Maps 1-2 Kills': 'M1-2 K',
    'Maps 1-3 Kills': 'M1-3 K',
    'Pitcher Strikeouts': "K's",
    'Hitter Strikeouts': 'SO',
    'Total Runs': 'Runs',
    'Margin Of Victory': 'MOV',
    'Margin of Victory': 'MOV',
  };
  const statDisplay = statAbbr[p.statName] || p.statName;
  const resHtml = isWon?'<div class="res-lbl w">✓ WON</div>':isLost?'<div class="res-lbl l">✗ LOST</div>':'';

  const pickData = encodeURIComponent(JSON.stringify({league:p.league,awayAbb:p.awayAbb,homeAbb:p.homeAbb,name:p.name}));
  return `<div class="pick" onclick="openPick('${pickData}')">
    ${avHtml}
    <div class="mid">
      <div class="name-row"><div class="pname">${p.name}</div>${p.pos?`<div class="pbadge">${p.pos}</div>`:''} ${(p.playerOut && isLive) ? '<div class="out-badge">OUT</div>' : ''}</div>
      ${gameStr?`<div class="game-row">${gameStr}</div>`:''}
      ${progHtml}
    </div>
    <div class="linebox ${boxCls}">
      <div class="dir ${dirCls}">${dir}</div>
      <div class="linenum">${p.line}</div>
      <div class="statlbl">${odds}${p.statName}</div>
      ${resHtml}
    </div>
  </div>`;
}
</script>
</body>
</html>
