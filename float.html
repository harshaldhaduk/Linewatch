<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg3:    rgba(255,255,255,0.12);
    --border: rgba(255,255,255,0.15);
    --accent: #a78bfa;
    --green:  #4ade80;
    --red:    #f87171;
    --gold:   #fbbf24;
    --text:   #ffffff;
    --sub:    rgba(255,255,255,0.65);
  }

  html, body {
    height: 100%;
    width: 100%;
    background: transparent;
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    user-select: none;
    overflow: hidden;
    margin: 0; padding: 0;
  }

  #wrap {
    height: 100%;
    background: rgba(80,80,85,0.82);
    backdrop-filter: blur(28px) saturate(200%);
    -webkit-backdrop-filter: blur(28px) saturate(200%);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(255,255,255,0.05);
    overflow: hidden;
  }

  /* Drag handle at top */
  #titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
    flex-shrink: 0;
    cursor: move;
  }

  #titlebar-left {
    display: flex; align-items: center; gap: 8px;
  }

  /* Traffic light close button */
  #close-btn {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #ff5f57;
    border: none; cursor: pointer;
    -webkit-app-region: no-drag;
    transition: opacity 0.15s;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }
  #close-btn:hover { opacity: 0.8; }

  #title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--sub);
  }
  #header-dots { display: flex; gap: 4px; align-items: center; }
  .hdot { width: 4px; height: 4px; border-radius: 50%; }
  .hdot.won  { background: var(--green); box-shadow: 0 0 6px 2px var(--green); }
  .hdot.lost { background: var(--red);   box-shadow: 0 0 6px 2px var(--red); }
  .hdot.live { background: var(--gold);  box-shadow: 0 0 6px 2px var(--gold); animation: pulse 1.4s infinite; }
  .hdot.pre  { background: var(--sub);   box-shadow: 0 0 4px 1px var(--sub); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  #titlebar-right {
    display: flex; align-items: center; gap: 8px;
  }

  #wl {
    font-size: 11px; font-weight: 700;
    display: flex; gap: 6px;
  }
  .wl-w { color: var(--green); }
  .wl-l { color: var(--red); }
  .wl-o { color: var(--sub); }

  #refresh-btn {
    font-size: 13px; color: var(--sub); cursor: pointer;
    padding: 2px 4px; border-radius: 4px; transition: color 0.15s;
    -webkit-app-region: no-drag;
  }
  #refresh-btn:hover { color: var(--text); }
  #refresh-btn.spin { animation: spin 0.5s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Body */
  #body {
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    max-height: calc(100vh - 44px);
    flex: 1;
  }
  #body::-webkit-scrollbar { width: 3px; }
  #body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .entry-hdr {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px 6px; border-bottom: 1px solid var(--border);
  }
  .entry-amt { font-size: 11px; font-weight: 700; color: var(--sub); }
  .entry-amt span { color: var(--gold); }
  .entry-rec { font-size: 11px; display: flex; gap: 6px; }
  .entry-rec .w { color: var(--green); font-weight: 700; }
  .entry-rec .l { color: var(--red); font-weight: 700; }

  .pick {
    display: grid;
    grid-template-columns: 44px 1fr 64px;
    gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .pick:hover { background: rgba(255,255,255,0.04); }
  .pick { cursor: pointer; }

  .av {
    width: 40px; height: 40px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--border);
    background: var(--bg3); flex-shrink: 0;
  }
  .av.won-r  { border-color: var(--green); box-shadow: 0 0 7px #22c55e55; }
  .av.lost-r { border-color: var(--red);   box-shadow: 0 0 7px #ef444455; }
  .av.live-r {
    border-color: #fff;
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  @keyframes live-pulse {
    0%,100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.9), 0 0 5px rgba(255,255,255,0.3); border-color: #fff; }
    50%      { box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 0 8px rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
  }
  .av-ph {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg3); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .av-teams {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg3); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    gap: 2px; padding: 6px; overflow: hidden; flex-shrink: 0;
  }
  .av-teams img { flex: 1; height: 100%; object-fit: contain; }
  .av-teams.won-r  { border-color: var(--green); box-shadow: 0 0 7px #22c55e55; }
  .av-teams.lost-r { border-color: var(--red);   box-shadow: 0 0 7px #ef444455; }
  .av-teams.live-r { border-color: #fff; animation: live-pulse 1.4s ease-in-out infinite; }
  .av-logo {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg3); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    padding: 6px; overflow: hidden; flex-shrink: 0;
  }
  .av-logo img { width: 100%; height: 100%; object-fit: contain; }
  .av-logo.won-r  { border-color: var(--green); box-shadow: 0 0 7px #22c55e55; }
  .av-logo.lost-r { border-color: var(--red);   box-shadow: 0 0 7px #ef444455; }
  .av-logo.live-r { border-color: #fff; animation: live-pulse 1.4s ease-in-out infinite; }

  .mid { min-width: 0; }
  .name-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
  .pname { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pbadge { font-size: 8px; font-weight: 600; color: var(--sub); background: var(--bg3); padding: 1px 3px; border-radius: 3px; flex-shrink: 0; }
  .out-badge { font-size: 8px; font-weight: 700; color: var(--red); padding: 1px 3px; border-radius: 3px; border: 1px solid var(--red)66; flex-shrink: 0; }
  .game-row { font-size: 9px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .league-tag { background: var(--bg3); padding: 1px 3px; border-radius: 3px; font-weight: 600; margin-right: 2px; }
  .live-tag { color: var(--gold); font-weight: 600; }

  .prog-track { height: 3px; background: var(--bg3); border-radius: 2px; margin-bottom: 3px; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .prog-fill.c-green { background: var(--green); }
  .prog-fill.c-red   { background: var(--red); }
  .prog-fill.c-white { background: #ffffff; }
  .prog-fill.c-grey  { background: rgba(255,255,255,0.25); }
  .prog-labels { display: flex; justify-content: space-between; font-size: 9px; font-weight: 600; }
  .prog-labels .cur { color: var(--text); }
  .prog-labels .lv  { color: var(--sub); }

  .linebox {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 9px; padding: 5px 6px; text-align: center; flex-shrink: 0;
  }
  .linebox.won-box  { border-color: #22c55e44; background: #22c55e0d; }
  .linebox.lost-box { border-color: #ef444444; background: #ef44440d; }
  .dir { font-size: 12px; line-height: 1; margin-bottom: 1px; }
  .dir.up { color: var(--green); } .dir.down { color: var(--red); }
  .linenum { font-size: 13px; font-weight: 800; color: var(--text); line-height: 1; }
  .statlbl { font-size: 7px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .res-lbl { font-size: 8px; font-weight: 800; margin-top: 2px; }
  .res-lbl.w { color: var(--green); } .res-lbl.l { color: var(--red); }

  .msg { padding: 24px; text-align: center; color: var(--sub); font-size: 13px; }
  .msg.err { color: var(--red); }

  /* Resize handle */
  #resize-handle {
    position: fixed; bottom: 0; right: 0;
    width: 10px; height: 10px;
    cursor: nwse-resize;
    -webkit-app-region: no-drag;
    opacity: 0;
    background: linear-gradient(135deg, transparent 50%, var(--sub) 50%);
    border-radius: 0 0 14px 0;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="titlebar">
    <div id="titlebar-left">
      <button id="close-btn" onclick="closeFloat()"></button>
      <div id="title">Linewatch</div>
      <div id="header-dots"></div>
    </div>
    <div id="titlebar-right">
      <div id="account-switcher" style="display:none;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--sub);-webkit-app-region:no-drag;">
        <span onclick="prevAccount()" style="cursor:pointer;padding:1px 4px;-webkit-app-region:no-drag;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--sub)'">‹</span>
        <span id="account-label"></span>
        <span onclick="nextAccount()" style="cursor:pointer;padding:1px 4px;-webkit-app-region:no-drag;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--sub)'">›</span>
      </div>
      <div id="wl"></div>
      <div id="refresh-btn" onclick="doRefresh()">↻</div>
    </div>
  </div>
  <div id="body"><div class="msg">Loading…</div></div>
</div>
<div id="resize-handle"></div>

<script>
const { ipcRenderer } = require('electron');

function closeFloat() { ipcRenderer.send('toggle-float'); }

function openPick(encoded) {
  const p = JSON.parse(decodeURIComponent(encoded));
  const { shell } = require('electron');
  const league = (p.league || '').toUpperCase();
  const esports = ['CS2','CS:GO','LOL','DOTA2','DOTA','VALORANT','OVERWATCH','APEX','FORTNITE','ROCKET LEAGUE','COD','PUBG','R6','HALO'];
  const isEsport = esports.some(e => league.includes(e));
  const today = new Date();
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const mon = months[today.getMonth()];
  const dd = today.getDate();
  const yyyy = today.getFullYear();
  const teams = p.awayAbb && p.homeAbb ? `${p.awayAbb} vs ${p.homeAbb}` : p.name;

  if (isEsport) {
    const searchTeams = (p.awayAbb && p.homeAbb) ? `${p.awayAbb} vs ${p.homeAbb}` 
                      : p.matchTitle ? p.matchTitle 
                      : p.name;
    const query = encodeURIComponent(`${searchTeams} ${mon} ${dd} gosugamers`);
    shell.openExternal(`https://www.google.com/search?q=${query}`);
  } else {
    const query = encodeURIComponent(`${teams} ${mon} ${dd} espn`);
    shell.openExternal(`https://www.google.com/search?q=${query}&btnI=1`);
  }
}
function doRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spin');
  setTimeout(() => btn.classList.remove('spin'), 500);
  ipcRenderer.send('refresh');
}

let _accounts = [];
let _activeAccount = 0;

function prevAccount() {
  const idx = (_activeAccount - 1 + _accounts.length) % _accounts.length;
  ipcRenderer.send('switch-account', idx);
}
function nextAccount() {
  const idx = (_activeAccount + 1) % _accounts.length;
  ipcRenderer.send('switch-account', idx);
}

ipcRenderer.on('picks-data', (_, { entries, error, accounts, activeAccount }) => {
  _accounts = accounts || ['Acc 1'];
  _activeAccount = activeAccount || 0;
  const sw = document.getElementById('account-switcher');
  if (sw) { sw.style.display = _accounts.length > 1 ? 'flex' : 'none'; }
  const lbl = document.getElementById('account-label');
  if (lbl) lbl.textContent = _accounts[_activeAccount] || '';
  render(entries, error);
  // Report height so window auto-sizes
  requestAnimationFrame(() => {
    const wrap = document.getElementById('wrap');
    // Auto-size once on first load, then let user resize freely
    const titlebar = document.getElementById('titlebar');
    const body = document.getElementById('body');
    if (titlebar && body && !window._floatSized) {
      window._floatSized = true;
      const h = titlebar.offsetHeight + body.scrollHeight;
      ipcRenderer.send('float-height', h);
    }
  });
});

function render(entries, error) {
  const body = document.getElementById('body');
  const wlEl = document.getElementById('wl');
  const dotsEl = document.getElementById('header-dots');

  const tw = (entries||[]).reduce((s,e)=>s+e.won, 0);
  const tl = (entries||[]).reduce((s,e)=>s+e.lost,0);
  const to = (entries||[]).reduce((s,e)=>s+e.open,0);
  wlEl.innerHTML = `<span class="wl-w">${tw}W</span><span class="wl-l">${tl}L</span>`;

  // Render dots
  if (dotsEl) {
    dotsEl.innerHTML = '';
    const allPicks = (entries||[]).flatMap(e=>e.picks);
    allPicks.slice(0,10).forEach(p => {
      const d = document.createElement('div');
      d.className = 'hdot';
      if (['won','correct','win'].includes(p.result)) d.classList.add('won');
      else if (['lost','incorrect','loss'].includes(p.result)) d.classList.add('lost');
      else if (p.inGame) d.classList.add('live');
      else d.classList.add('pre');
      dotsEl.appendChild(d);
    });
  }

  if (error) { body.innerHTML = `<div class="msg err">⚠️ ${error}</div>`; return; }
  if (!entries || !entries.length) {
    body.innerHTML = `<div class="msg">No active picks</div>`;
    document.getElementById('resize-handle').style.display = 'none';
    return;
  }
  document.getElementById('resize-handle').style.display = '';

  body.innerHTML = entries.map((entry, ei) => `
    <div class="entry-hdr">
      <div class="entry-amt">${entry.amount} <span>→ ${entry.payout}</span></div>
      <div class="entry-rec"><span class="w">${entry.won}W</span><span class="l">${entry.lost}L</span><span style="color:var(--sub)">${entry.open} live</span></div>
    </div>
    ${entry.picks.map(p => pickHtml(p)).join('')}
    ${ei < entries.length-1 ? '<div style="height:1px;background:#8b5cf622;margin:2px 12px"></div>' : ''}
  `).join('');
}

function pickHtml(p) {
  const isWon  = ['won','correct','win'].includes(p.result);
  const isLost = ['lost','incorrect','loss'].includes(p.result);
  const isDone = p.gameFinished;
  const isLive = p.inGame && !isDone && !isWon && !isLost;
  const isPre  = !p.inGame && !isDone && !isWon && !isLost;
  const cur2 = parseFloat(p.current)||0, lin2 = parseFloat(p.line)||1;
  const winning2 = p.wagerType === 'over' ? cur2 >= lin2 : cur2 <= lin2;
  const isOver2 = p.wagerType === 'over';
  const underBusted2 = !isOver2 && isLive && cur2 > lin2;
  const overWinning2 = isOver2 && isLive && winning2;
  const isTeamPick = p.source === 'underdog' && !p.imgUrl;

  let ringCls = '';
  if (isWon || (isDone && winning2))                                          ringCls = 'won-r';
  else if (isLost || (isDone && !winning2) || (!isTeamPick && underBusted2)) ringCls = 'lost-r';
  else if (!isTeamPick && overWinning2)                                       ringCls = 'won-r';
  else if (isLive)                                                            ringCls = 'live-r';
  const boxCls = (isWon || (isDone && winning2)) ? 'won-box' : (isLost || (isDone && !winning2) || (!isTeamPick && underBusted2)) ? 'lost-box' : '';

  const _lg = (p.league||'').toLowerCase();
  const _isTotal = /total|o\/u|runs|goals/i.test(p.statName||'');
  const _teamAbb = (p.name||'').toUpperCase().includes((p.awayAbb||'').toUpperCase()) ? p.awayAbb : p.homeAbb;
  const avHtml = p.imgUrl
    ? `<img class="av ${ringCls}" src="${p.imgUrl}" onerror="this.outerHTML='<div class=\\'av-ph\\'>👤</div>'">`
    : (p.source === 'underdog' && p.awayAbb && p.homeAbb)
    ? _isTotal
      ? `<div class="av-teams ${ringCls}"><img src="https://a.espncdn.com/i/teamlogos/${_lg}/500/${p.awayAbb.toLowerCase()}.png" onerror="this.style.display='none'"><img src="https://a.espncdn.com/i/teamlogos/${_lg}/500/${p.homeAbb.toLowerCase()}.png" onerror="this.style.display='none'"></div>`
      : `<div class="av-logo ${ringCls}"><img src="https://a.espncdn.com/i/teamlogos/${_lg}/500/${_teamAbb.toLowerCase()}.png" onerror="this.parentElement.outerHTML='<div class=\\'av-ph\\'>👤</div>'"></div>`
    : `<div class="av-ph">👤</div>`;

  let gameStr = '';
  if (p.awayAbb && p.homeAbb) {
    if (isLive) {
      // Live: show scores and quarter/clock in gold
      const isHalftime = p.clock === '00:00' && (p.period === 2 || p.period === '2') && p.punit === 'quarter';
      const isHalfOrEnd = p.clock === '00:00';
      let pl;
      if (isHalftime) pl = 'Halftime';
      else pl = p.punit==='quarter'?`Q${p.period}`:p.punit==='half'?`H${p.period}`:`P${p.period}`;
      const clockStr = (isHalftime || isHalfOrEnd) ? '' : p.clock ? ` · ${p.clock}` : '';
      gameStr = `<span class="league-tag">${p.league}</span>${p.awayAbb} ${p.awaySc} @ ${p.homeAbb} ${p.homeSc} <span class="live-tag">${pl}${clockStr}</span>`;
    } else if (isPre && p.startTime) {
      // Pre-game: show teams and start time in gold
      gameStr = `<span class="league-tag">${p.league}</span>${p.awayAbb} @ ${p.homeAbb} <span class="live-tag">${p.startTime}</span>`;
    } else if (isDone) {
      // Game over: no yellow, just show final score
      gameStr = `<span class="league-tag">${p.league}</span>${p.awayAbb} ${p.awaySc} @ ${p.homeAbb} ${p.homeSc} FINAL`;
    } else {
    }
  } else if (p.league) {
    const timeStr = isPre && p.startTime ? `<span class="live-tag">${p.startTime}</span>` : (isLive && !isDone) ? '<span class="live-tag">LIVE</span>' : '';
    // Show match title if available (for esports Underdog picks)
    const matchTitle = p.matchTitle ? `${p.matchTitle} ` : '';
    gameStr = `<span class="league-tag">${p.league}</span>${matchTitle}${timeStr}`;
  }

  let progHtml = '';
  if (p.line != null) {
    const cur = parseFloat(p.current != null ? p.current : 0)||0, lin = parseFloat(p.line)||1;
    const pct = Math.min((cur/lin)*100,100);
    const win_f = p.wagerType==='over' ? cur>=lin : cur<=lin;
    let fc = 'c-grey';
    const isOver_f = p.wagerType === 'over';
    const underBusted_f = !isOver_f && isLive && cur > lin;
    if (isWon||(isDone&&win_f))                                       fc='c-green';
    else if (isLost||(isDone&&!win_f)||(!isTeamPick&&underBusted_f)) fc='c-red';
    else if (!isTeamPick&&isLive&&isOver_f&&win_f)                   fc='c-green';
    else if (isLive)                                                  fc='c-white';
    progHtml = `<div class="prog-track"><div class="prog-fill ${fc}" style="width:${pct}%"></div></div>
    <div class="prog-labels"><span class="cur">${cur%1===0?cur:cur.toFixed(1)}</span><span class="lv">/ ${lin}</span></div>`;
  }

  const dir = p.wagerType==='over'?'↑':'↓';
  const dirCls = p.wagerType==='over'?'up':'down';
  const odds = '';
  const statAbbr = {
    'Points + Rebounds + Assists': 'PRA',
    'Points + Rebounds': 'Pts+Reb',
    'Points + Assists': 'Pts+Ast',
    'Rebounds + Assists': 'Reb+Ast',
    'Pts + Rebs + Asts': 'PRA',
    'Pts + Rebounds + Assists': 'PRA',
    'Points + Rebs + Asts': 'PRA',
    'REBS+ASTS': 'Reb+Ast',
    'Maps 1-2 Kills': 'M1-2 K',
    'Maps 1-3 Kills': 'M1-3 K',
    'Pitcher Strikeouts': "K's",
    'Hitter Strikeouts': 'SO',
    'Total Runs': 'Runs',
    'Margin Of Victory': 'MOV',
    'Margin of Victory': 'MOV',
    'Hits+Runs+RBIs': 'HRR',
    'Hits + Runs + RBIs': 'HRR',
    'H+R+RBI': 'HRR',
  };
  const statDisplay = statAbbr[p.statName] || p.statName;
  const resHtml = isWon?'<div class="res-lbl w">✓ WON</div>':isLost?'<div class="res-lbl l">✗ LOST</div>':'';

  const pickData = encodeURIComponent(JSON.stringify({league:p.league,awayAbb:p.awayAbb,homeAbb:p.homeAbb,name:p.name}));
  return `<div class="pick" onclick="openPick('${pickData}')">
    ${avHtml}
    <div class="mid">
      <div class="name-row"><div class="pname">${p.name}</div>${p.pos?`<div class="pbadge">${p.pos}</div>`:''} ${(p.playerOut && isLive) ? '<div class="out-badge">OUT</div>' : ''}</div>
      ${gameStr?`<div class="game-row">${gameStr}</div>`:''}
      ${progHtml}
    </div>
    <div class="linebox ${boxCls}">
      <div class="dir ${dirCls}">${dir}</div>
      <div class="linenum">${p.line}</div>
      <div class="statlbl">${odds}${statDisplay}</div>
      ${resHtml}
    </div>
  </div>`;
}
</script>
</body>
</html>
